<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elderly Medicine Care - Smart Health Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Animated Background -->
<div class="animated-bg">
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div class="gradient-blob blob-3"></div>
</div>

<!-- Floating Icons -->
<div class="floating-icons">
    <div class="icon icon-pill" aria-hidden="true">💊</div>
    <div class="icon icon-heart" aria-hidden="true">❤️</div>
    <div class="icon icon-cross" aria-hidden="true">✨</div>
    <div class="icon icon-capsule" aria-hidden="true">💉</div>
</div>

<!-- Main Container -->
<div class="page">
    <div class="hero-wrapper">
        
        <!-- Glassmorphism Card -->
        <div class="hero-card">
            
            <!-- Card Header -->
            <div class="card-header">
                <div class="brand-icon">⚕️</div>
            </div>

            <!-- Card Content -->
            <div class="card-content">
                <h1 class="hero-title">Elderly Medicine Care</h1>
                
                <p class="hero-subtitle">
                    Never miss a dose. Manage medicines smartly, connect with family, and find nearby pharmacies—all in one secure platform.
                </p>

                <!-- Features Grid -->
                <div class="features-grid">
                    <div class="feature-item">
                        <span class="feature-icon">🔔</span>
                        <span class="feature-text">Smart Reminders</span>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">👥</span>
                        <span class="feature-text">Emergency Contacts</span>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">🏥</span>
                        <span class="feature-text">Pharmacy Locator</span>
                    </div>
                </div>

                <!-- CTA Button -->
                <a href="/accounts/google/login/" class="btn-primary google-btn" data-ripple>
                    <svg class="google-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>Continue with Google</span>
                </a>

                <!-- Trust Badges -->
                <div class="trust-badges">
                    <div class="badge">🔒 Secure</div>
                    <div class="badge">👨‍⚕️ Doctor Approved</div>
                    <div class="badge">👨‍👩‍👧 Family Safe</div>
                </div>
            </div>

            <!-- Decorative Border -->
            <div class="card-border"></div>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
